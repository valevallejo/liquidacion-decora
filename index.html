<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquidación Decora</title>
<script>
  const SHEET_ID = "1Zvf017OwhwKMb7_0NEKvhU0PnegumNCLUilMh63pM7U";
  const GID_60         = "488240662";
  const GID_30         = "911640390";
  const GID_PRECIOS    = "1086284473";
  const GID_INVENTARIO = "1787664807";
  const GID_FOTOS      = "0";
  const COL_LISTA     = "Lista Costa 1";
  const COL_PRECIO    = "Oferta Costa 1";
  const COL_DESCUENTO = "Dcto Costa 1";
  const COL_CANTIDAD  = "Libre utilización";
  const COL_TIENDA    = "Nombre 1";
  const COL_NOMBRE    = "Nombre";
  const COL_SUBLINEA  = "Sublinea";
  const COL_FOTO      = "Foto";
  function urlCSV(gid){ return "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/export?format=csv&gid="+gid; }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --rojo:#C8102E; --rojo-osc:#9A0D24; --rojo-soft:#FEF2F4;
    --bg:#FBFBF9; --surface:#FFFFFF; --texto:#26272B; --muted:#8A8F98; --border:#ECECEA;
    --high:#15803D; --high-bg:#ECFDF3; --low:#B45309; --low-bg:#FFF7ED;
    --r:10px; --r-sm:8px;
    --shadow:0 1px 3px rgba(20,20,30,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow-x:hidden}
  body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--texto);font-size:15px;line-height:1.45}
  a{color:inherit}
  header{padding:20px 20px 0;text-align:center}
  header h1{font-size:1.35rem;font-weight:600;letter-spacing:-.2px;color:var(--texto)}
  header h1 .dot{color:var(--rojo)}
  header p{font-size:.85rem;color:var(--muted);margin-top:2px}
  .wrap{max-width:1280px;margin:0 auto;padding:0 20px 40px}

  .stats{display:flex;gap:10px;margin:18px 0 0;flex-wrap:wrap}
  .stat{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
  .stat b{display:block;font-size:1.5rem;font-weight:600;color:var(--texto);line-height:1.1;letter-spacing:-.5px}
  .stat span{font-size:.72rem;color:var(--muted);font-weight:500}

  .layout{display:grid;grid-template-columns:248px 1fr;gap:18px;margin-top:18px;align-items:start}
  .main{min-width:0}

  /* Sidebar */
  .sidebar{position:sticky;top:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:6px 14px 14px;max-height:calc(100vh - 28px);overflow:auto}
  .side-sec{padding:14px 0;border-bottom:1px solid var(--border)}
  .side-sec:last-child{border-bottom:none}
  .side-lab{font-size:.72rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600;margin-bottom:9px}
  .side-sec input.txt{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:.88rem;font-family:inherit;background:#fff;color:var(--texto)}
  .side-sec input.txt:focus{outline:none;border-color:var(--rojo);box-shadow:0 0 0 3px var(--rojo-soft)}
  .mini{margin-bottom:8px}
  .checklist{max-height:210px;overflow:auto;display:flex;flex-direction:column;gap:1px}
  .checklist label{display:flex;align-items:center;gap:9px;padding:7px 6px;border-radius:6px;font-size:.86rem;cursor:pointer;color:var(--texto)}
  .checklist label:hover{background:var(--bg)}
  .checklist input{width:16px;height:16px;accent-color:var(--rojo);flex:none}
  .all-row{display:flex;align-items:center;gap:9px;padding:7px 6px;border-radius:6px;font-size:.88rem;font-weight:600;cursor:pointer;margin-bottom:4px}
  .all-row input{width:16px;height:16px;accent-color:var(--rojo)}
  .side-clear{margin-top:8px;background:none;border:none;color:var(--rojo);font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;padding:2px}
  .filtros-btn{display:none}

  /* Tabs */
  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tab{flex:1;padding:11px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--muted);font-size:.92rem;font-weight:600;cursor:pointer;transition:.15s}
  .tab small{display:block;font-weight:400;font-size:.72rem;opacity:.85;margin-top:1px}
  .tab.activo{background:var(--rojo);color:#fff;border-color:var(--rojo)}

  .barra{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .conteo{font-size:.85rem;color:var(--muted)} .conteo b{color:var(--texto);font-weight:600}
  .switch{display:inline-flex;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;background:#fff}
  .switch button{border:none;background:#fff;color:var(--muted);padding:7px 14px;font-size:.82rem;font-weight:500;cursor:pointer;font-family:inherit}
  .switch button.on{background:var(--rojo);color:#fff}

  /* Tarjetas */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(208px,1fr));gap:14px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;transition:.15s}
  .card:hover{box-shadow:var(--shadow)}
  .card .foto{position:relative;aspect-ratio:1/1;background:#f6f6f4;overflow:hidden}
  .card .foto img{width:100%;height:100%;object-fit:cover;display:block}
  .badge{position:absolute;top:8px;left:8px;background:var(--rojo);color:#fff;font-weight:600;font-size:.78rem;padding:3px 8px;border-radius:6px}
  .card .info{padding:11px 12px;display:flex;flex-direction:column;gap:5px;flex:1}
  .card .nombre{font-weight:500;font-size:.9rem;line-height:1.3}
  .card .sub{font-size:.7rem;color:var(--muted)}
  .card .ref{font-size:.7rem;color:var(--muted)}
  .precios{margin-top:auto;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .antes{color:var(--muted);text-decoration:line-through;font-size:.8rem}
  .ahora{color:var(--rojo);font-weight:600;font-size:1.05rem}
  .verloc{display:flex;justify-content:space-between;align-items:center;gap:6px;font-size:.76rem;color:var(--muted);border-top:1px solid var(--border);padding:8px 0 0;margin-top:3px;cursor:pointer;background:none;border-left:none;border-right:none;border-bottom:none;width:100%;font-family:inherit;text-align:left}
  .verloc:hover{color:var(--rojo)}
  .verloc .pill{padding:1px 8px;border-radius:6px;font-weight:600;font-size:.72rem}
  .pill.high{background:var(--high-bg);color:var(--high)}
  .pill.low{background:var(--low-bg);color:var(--low)}
  .pill.zero{background:#f3f4f6;color:var(--muted)}
  .card-loc{border-top:1px dashed var(--border);margin-top:8px;padding-top:8px;display:flex;flex-direction:column;gap:5px}
  .card-loc[hidden]{display:none}
  .card-loc .l{display:flex;justify-content:space-between;font-size:.76rem}
  .card-loc .l span:first-child{color:var(--muted)}
  .card-loc .l b{font-weight:600}

  /* Tabla */
  .tablaWrap{overflow:auto;max-width:100%;max-height:72vh;border:1px solid var(--border);border-radius:var(--r);background:#fff}
  table.tabla{border-collapse:separate;border-spacing:0;font-size:.82rem;width:max-content;min-width:100%}
  table.tabla th,table.tabla td{padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;text-align:center}
  table.tabla thead th{position:sticky;top:0;background:#fff;color:var(--texto);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.3px;z-index:2;border-bottom:1px solid var(--border)}
  table.tabla thead th.alm{color:var(--muted)}
  .c-foto,.c-cod,.c-prod{position:sticky;background:#fff;z-index:1;text-align:left}
  .c-foto{left:0;width:52px;min-width:52px}
  .c-cod{left:52px;width:84px;min-width:84px}
  .c-prod{left:136px;width:200px;min-width:200px}
  thead .c-foto,thead .c-cod,thead .c-prod{z-index:4}
  tbody tr:nth-child(even) td{background:#FAFAF8}
  tbody tr:nth-child(even) .c-foto,tbody tr:nth-child(even) .c-cod,tbody tr:nth-child(even) .c-prod{background:#FAFAF8}
  tbody tr:hover td{background:var(--rojo-soft)}
  tbody tr:hover .c-foto,tbody tr:hover .c-cod,tbody tr:hover .c-prod{background:var(--rojo-soft)}
  td.nombre{font-weight:500;white-space:normal}
  td.antes{color:var(--muted);text-decoration:line-through}
  td.precio{font-weight:600;color:var(--rojo)}
  .tfoto{width:38px;height:38px;object-fit:cover;border-radius:6px;background:#f6f6f4}
  td.cero{color:#cfd2d6}
  td.hay{font-weight:600;color:var(--high)}
  td.suma{font-weight:600;cursor:pointer}
  tfoot td{position:sticky;bottom:0;background:#FFF7F8;font-weight:600;border-top:2px solid var(--rojo);z-index:3}
  tfoot td.c-prod{z-index:5;left:136px}
  tfoot td.c-foto{left:0;z-index:5} tfoot td.c-cod{left:52px;z-index:5}

  /* Paginación */
  .pagination{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:16px;flex-wrap:wrap}
  .pagination[hidden]{display:none}
  .page-btn{background:#fff;border:1px solid var(--border);padding:8px 16px;border-radius:var(--r-sm);font-family:inherit;font-size:13px;font-weight:500;color:var(--texto);cursor:pointer}
  .page-btn:hover:not(:disabled){border-color:var(--rojo);color:var(--rojo)}
  .page-btn:disabled{opacity:.35;cursor:not-allowed}
  .page-info{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:12.5px;color:var(--muted)}
  .page-range b{color:var(--texto);font-weight:600}
  .page-jump{display:flex;align-items:center;gap:6px}
  .page-input{width:56px;padding:5px 7px;border:1px solid var(--border);border-radius:var(--r-sm);font-family:inherit;font-size:13px;text-align:center}
  .page-input:focus{outline:none;border-color:var(--rojo);box-shadow:0 0 0 3px var(--rojo-soft)}

  .estado{text-align:center;padding:46px 20px;color:var(--muted)}
  footer{text-align:center;padding:24px;color:var(--muted);font-size:.78rem}

  @media(max-width:860px){
    .layout{grid-template-columns:1fr}
    .sidebar{position:static;max-height:none}
    .sidebar[data-collapsed="1"]{display:none}
    .filtros-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 14px;font-size:.9rem;font-weight:600;font-family:inherit;cursor:pointer;margin-bottom:12px;color:var(--texto)}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  }
</style>
</head>
<body>
<header>
  <h1>Liquidación Decora<span class="dot">.</span></h1>
  <p>Disponibilidad por tienda</p>
</header>
<div class="wrap">

  <div class="stats">
    <div class="stat"><b id="stProd">—</b><span>Productos</span></div>
    <div class="stat"><b id="stTie">—</b><span>Almacenes</span></div>
    <div class="stat"><b id="stUni">—</b><span>Unidades en stock</span></div>
  </div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="side-sec">
        <div class="side-lab">Buscar</div>
        <input id="buscar" class="txt" type="text" placeholder="Nombre o código...">
      </div>
      <div class="side-sec">
        <div class="side-lab">Sublínea</div>
        <input id="subSearch" class="txt mini" type="text" placeholder="Filtrar sublínea..." oninput="filtrarSub()">
        <div class="checklist" id="subLista"></div>
        <button class="side-clear" onclick="limpiarSub()">Limpiar sublíneas</button>
      </div>
      <div class="side-sec">
        <div class="side-lab">Almacén</div>
        <input id="msSearch" class="txt mini" type="text" placeholder="Filtrar almacén..." oninput="filtrarMS()">
        <label class="all-row" id="msAll"><input type="checkbox" id="msAllChk" checked onchange="limpiarMS()"> Todas las tiendas</label>
        <div class="checklist" id="msLista"></div>
      </div>
    </aside>

    <main class="main">
      <button class="filtros-btn" onclick="toggleSidebar()">☰ Filtros</button>
      <div class="tabs">
        <button class="tab activo" id="tabAlto" onclick="cambiarTab('alto')">Liquidación 60% <small>60% o más</small></button>
        <button class="tab" id="tabBajo" onclick="cambiarTab('bajo')">Liquidación 30% <small>otros descuentos</small></button>
      </div>
      <div class="barra">
        <span class="conteo" id="conteo">—</span>
        <span class="switch">
          <button id="btnTarjetas" class="on" onclick="cambiarVista('tarjetas')">Tarjetas</button>
          <button id="btnTabla" onclick="cambiarVista('tabla')">Tabla</button>
        </span>
      </div>
      <div id="contenido"></div>
      <div id="estado" class="estado">Cargando productos…</div>
      <nav class="pagination" id="paginacion" hidden>
        <button class="page-btn" id="pgPrev" onclick="irAPagina(pagina-1)">‹ Anterior</button>
        <div class="page-info">
          <span class="page-range" id="pgRango"></span>
          <span class="page-jump">Página <input class="page-input" id="pgInput" type="number" min="1" value="1" onchange="irAPagina(parseInt(this.value)||1)"> de <b id="pgTotal">1</b></span>
        </div>
        <button class="page-btn" id="pgNext" onclick="irAPagina(pagina+1)">Siguiente ›</button>
      </nav>
    </main>
  </div>
</div>
<footer>Liquidación Decora · datos en vivo desde Google Sheets</footer>
<script>
let TODOS=[], ALMACENES=[], SUBLINEAS=[];
let SELEC=new Set(), SELSUB=new Set();
let tabActual='alto', vista='tarjetas', pagina=1;
const PAGE_SIZE=36;
const IMG_GENERICA='data:image/svg+xml;utf8,'+encodeURIComponent(
 "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'>"+
 "<rect width='400' height='400' fill='#FBEDEA'/>"+
 "<circle cx='200' cy='180' r='130' fill='#F7D8D1'/>"+
 "<path d='M152 110 L248 110 L232 168 L168 168 Z' fill='#C8102E'/>"+
 "<rect x='196' y='168' width='8' height='96' rx='2' fill='#9A0D24'/>"+
 "<ellipse cx='200' cy='268' rx='46' ry='13' fill='#9A0D24'/>"+
 "<path d='M300 250 q-22 -52 -2 -96' stroke='#15803D' stroke-width='7' fill='none' stroke-linecap='round'/>"+
 "<path d='M300 252 q24 -44 6 -86' stroke='#15803D' stroke-width='7' fill='none' stroke-linecap='round'/>"+
 "<path d='M298 240 q-30 -22 -52 -16' stroke='#15803D' stroke-width='7' fill='none' stroke-linecap='round'/>"+
 "<path d='M300 240 q30 -18 50 -8' stroke='#15803D' stroke-width='7' fill='none' stroke-linecap='round'/>"+
 "<path d='M280 252 L322 252 L314 292 L288 292 Z' fill='#B45309'/>"+
 "<text x='200' y='338' text-anchor='middle' font-family='Arial,sans-serif' font-size='24' fill='#9A0D24' font-weight='bold'>DECORA</text>"+
 "<text x='200' y='366' text-anchor='middle' font-family='Arial,sans-serif' font-size='15' fill='#B45309'>Articulo sin foto</text>"+
 "</svg>");
window.IMG_GEN=IMG_GENERICA;

function num(v){ if(v==null) return 0; const n=parseFloat(String(v).replace(/[^0-9.,-]/g,'').replace(/\./g,'').replace(',','.')); return isNaN(n)?0:n; }
function pesos(v){ return v ? '$'+Math.round(v).toLocaleString('es-CO') : ''; }
function miles(v){ return (v||0).toLocaleString('es-CO'); }
function codigo(v){ return String(v||'').trim().toUpperCase(); }
function descPct(d){ if(d>0&&d<=1) return Math.round(d*100); return Math.round(d); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function campo(fila){ const nombres=Array.prototype.slice.call(arguments,1); const claves=Object.keys(fila); const limpio=s=>String(s).trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); for(const n of nombres){ const k=claves.find(c=>limpio(c)===limpio(n)); if(k!=null&&fila[k]!=null&&String(fila[k]).trim()!=='') return String(fila[k]).trim(); } return ''; }
function urlFoto(valor){ if(!valor||/sin\s*foto/i.test(valor)) return IMG_GENERICA; if(/^https?:\/\//i.test(valor)) return valor; return 'fotos/'+valor; }
function leerTab(gid){ return new Promise((resolve)=>{ Papa.parse(urlCSV(gid),{download:true,header:true,skipEmptyLines:true,complete:(r)=>resolve({rows:r.data,code:(r.meta.fields&&r.meta.fields[0])||null}),error:()=>resolve({rows:[],code:null})}); }); }
function clasePill(q){ return q<=0?'zero':(q<=3?'low':'high'); }

// unidades visibles según almacenes seleccionados
function invVisible(p){ const sel=[...SELEC]; if(!sel.length) return {total:p.inv,n:Object.keys(p.tiendas).filter(t=>p.tiendas[t]>0).length}; let total=0,n=0; sel.forEach(t=>{const q=p.tiendas[t]||0; if(q>0){total+=q;n++;}}); return {total,n}; }
// lista de tiendas a mostrar en el desglose (si hay filtro, solo esas)
function tiendasDe(p){ let ent=Object.entries(p.tiendas).filter(e=>e[1]>0); if(SELEC.size) ent=ent.filter(e=>SELEC.has(e[0])); return ent.sort((a,b)=>b[1]-a[1]); }

function locHTML(p){
  const ent=tiendasDe(p);
  if(!ent.length) return '<div class="card-loc" hidden><div class="l"><span>Sin stock en la selección</span></div></div>';
  return '<div class="card-loc" hidden>'+ent.map(e=>'<div class="l"><span>'+esc(e[0])+'</span><b>'+miles(e[1])+'</b></div>').join('')+'</div>';
}
function tarjeta(p){
  const iv=invVisible(p);
  const etiqueta=iv.n?(iv.n+(iv.n===1?' almacén':' almacenes')):'Sin stock';
  return '<div class="card"><div class="foto">'+(p.desc?'<span class="badge">-'+p.desc+'%</span>':'')+
    '<img src="'+esc(p.foto)+'" alt="'+esc(p.nombre)+'" loading="lazy" onerror="this.onerror=null;this.src=window.IMG_GEN"></div>'+
    '<div class="info"><div class="nombre">'+esc(p.nombre)+'</div>'+
    (p.sublinea?'<div class="sub">'+esc(p.sublinea)+'</div>':'')+
    (p.codigo?'<div class="ref">Cód: '+esc(p.codigo)+'</div>':'')+
    '<div class="precios">'+(p.antes?'<span class="antes">'+pesos(p.antes)+'</span>':'')+'<span class="ahora">'+(pesos(p.ahora)||'—')+'</span></div>'+
    '<button class="verloc" onclick="toggleLoc(this)"><span>📍 '+esc(etiqueta)+'</span><span class="pill '+clasePill(iv.total)+'">'+iv.total+' und ▾</span></button>'+
    locHTML(p)+
    '</div></div>';
}
function toggleLoc(btn){ const d=btn.nextElementSibling; if(d&&d.classList.contains('card-loc')) d.hidden=!d.hidden; }

function tablaHTML(lista, full){
  const cols=SELEC.size?[...SELEC].sort():ALMACENES;
  let head='<thead><tr><th class="c-foto">Foto</th><th class="c-cod">Código</th><th class="c-prod">Producto</th><th>Sublínea</th><th>Antes</th><th>Ahora</th><th>% Dcto</th><th>Inv.</th>'+cols.map(a=>'<th class="alm">'+esc(a)+'</th>').join('')+'</tr></thead>';
  let body='<tbody>'+lista.map(p=>{
    const iv=invVisible(p);
    const celdas=cols.map(a=>{const q=p.tiendas[a]||0; return '<td class="'+(q>0?'hay':'cero')+'">'+(q>0?miles(q):'0')+'</td>';}).join('');
    return '<tr><td class="c-foto"><img class="tfoto" src="'+esc(p.foto)+'" loading="lazy" onerror="this.onerror=null;this.src=window.IMG_GEN"></td>'+
      '<td class="c-cod">'+esc(p.codigo)+'</td><td class="c-prod nombre">'+esc(p.nombre)+'</td><td>'+esc(p.sublinea||'')+'</td>'+
      '<td class="antes">'+(pesos(p.antes)||'')+'</td><td class="precio">'+(pesos(p.ahora)||'—')+'</td><td>'+(p.desc?('-'+p.desc+'%'):'')+'</td>'+
      '<td class="suma">'+miles(iv.total)+'</td>'+celdas+'</tr>';
  }).join('')+'</tbody>';
  // subtotal por almacén (sobre TODO lo filtrado, no solo la página)
  let totInv=0; const totCol={}; cols.forEach(a=>totCol[a]=0);
  full.forEach(p=>{ totInv+=invVisible(p).total; cols.forEach(a=>{ totCol[a]+=(p.tiendas[a]||0); }); });
  let foot='<tfoot><tr><td class="c-foto"></td><td class="c-cod"></td><td class="c-prod">Subtotal por almacén</td><td></td><td></td><td></td><td>'+miles(totInv)+'</td>'+cols.map(a=>'<td>'+miles(totCol[a])+'</td>').join('')+'</tr></tfoot>';
  return '<div class="tablaWrap"><table class="tabla">'+head+body+foot+'</table></div>';
}

// ----- filtros sidebar -----
function actualizarMS(){ const n=SELEC.size; document.getElementById('msAllChk').checked=(n===0); }
function onCheck(t,checked){ if(checked) SELEC.add(t); else SELEC.delete(t); actualizarMS(); pagina=1; pintar(); }
function limpiarMS(){ SELEC.clear(); document.querySelectorAll('#msLista input').forEach(c=>c.checked=false); document.getElementById('msAllChk').checked=true; pagina=1; pintar(); }
function filtrarMS(){ const q=document.getElementById('msSearch').value.toLowerCase().trim(); document.querySelectorAll('#msLista label').forEach(l=>{ l.style.display=l.textContent.toLowerCase().includes(q)?'flex':'none'; }); }
function llenarTiendas(){ document.getElementById('msLista').innerHTML=ALMACENES.map(t=>'<label><input type="checkbox" value="'+esc(t)+'" onchange="onCheck(this.value,this.checked)">'+esc(t)+'</label>').join(''); }

function onCheckSub(s,checked){ if(checked) SELSUB.add(s); else SELSUB.delete(s); pagina=1; pintar(); }
function limpiarSub(){ SELSUB.clear(); document.querySelectorAll('#subLista input').forEach(c=>c.checked=false); pagina=1; pintar(); }
function filtrarSub(){ const q=document.getElementById('subSearch').value.toLowerCase().trim(); document.querySelectorAll('#subLista label').forEach(l=>{ l.style.display=l.textContent.toLowerCase().includes(q)?'flex':'none'; }); }
function llenarSublineas(){ document.getElementById('subLista').innerHTML=SUBLINEAS.map(s=>'<label><input type="checkbox" value="'+esc(s)+'" onchange="onCheckSub(this.value,this.checked)">'+esc(s)+'</label>').join(''); }

function toggleSidebar(){ const sb=document.getElementById('sidebar'); sb.dataset.collapsed = sb.dataset.collapsed==='1'?'0':'1'; }

function filtrar(){
  const q=document.getElementById('buscar').value.toLowerCase().trim();
  const sel=[...SELEC];
  let lista=TODOS.filter(p=>p.origen===tabActual);
  if(SELSUB.size) lista=lista.filter(p=>SELSUB.has(p.sublinea));
  if(sel.length) lista=lista.filter(p=>sel.some(t=>(p.tiendas[t]||0)>0));
  if(q) lista=lista.filter(p=>(p.nombre+' '+p.codigo+' '+p.sublinea).toLowerCase().includes(q));
  return lista;
}
function pintar(){
  const lista=filtrar();
  const cont=document.getElementById('contenido'), est=document.getElementById('estado'), total=lista.length;
  // resumen reactivo al filtro
  const uni=lista.reduce((a,p)=>a+invVisible(p).total,0);
  document.getElementById('stProd').textContent=miles(total);
  document.getElementById('stTie').textContent=miles(SELEC.size?SELEC.size:ALMACENES.length);
  document.getElementById('stUni').textContent=miles(uni);
  document.getElementById('conteo').innerHTML='<b>'+miles(total)+'</b> producto'+(total===1?'':'s')+(SELEC.size?' · '+miles(uni)+' und en la selección':'');

  if(total===0){ cont.innerHTML=''; est.style.display='block'; est.textContent='No hay productos con estos filtros.'; document.getElementById('paginacion').hidden=true; return; }
  est.style.display='none';
  const totalPag=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(pagina>totalPag) pagina=totalPag; if(pagina<1) pagina=1;
  const ini=(pagina-1)*PAGE_SIZE, slice=lista.slice(ini,ini+PAGE_SIZE);
  cont.innerHTML=(vista==='tarjetas')?'<div class="grid">'+slice.map(p=>tarjeta(p)).join('')+'</div>':tablaHTML(slice,lista);
  renderPaginacion(total,totalPag,ini);
}
function renderPaginacion(total,totalPag,ini){
  const nav=document.getElementById('paginacion');
  if(total<=PAGE_SIZE){ nav.hidden=true; return; }
  nav.hidden=false;
  document.getElementById('pgPrev').disabled=pagina<=1;
  document.getElementById('pgNext').disabled=pagina>=totalPag;
  const inp=document.getElementById('pgInput'); inp.value=pagina; inp.max=totalPag;
  document.getElementById('pgTotal').textContent=miles(totalPag);
  const desde=ini+1, hasta=Math.min(ini+PAGE_SIZE,total);
  document.getElementById('pgRango').innerHTML='<b>'+miles(desde)+'–'+miles(hasta)+'</b> de '+miles(total);
}
function irAPagina(n){ pagina=n; pintar(); window.scrollTo({top:0,behavior:'smooth'}); }
function cambiarTab(t){ tabActual=t; pagina=1; document.getElementById('tabAlto').classList.toggle('activo',t==='alto'); document.getElementById('tabBajo').classList.toggle('activo',t==='bajo'); pintar(); }
function cambiarVista(v){ vista=v; pagina=1; document.getElementById('btnTarjetas').classList.toggle('on',v==='tarjetas'); document.getElementById('btnTabla').classList.toggle('on',v==='tabla'); pintar(); }

function cargar(){
  Promise.all([leerTab(GID_60),leerTab(GID_30),leerTab(GID_PRECIOS),leerTab(GID_INVENTARIO),leerTab(GID_FOTOS)]).then(function(res){
    const liq60=res[0],liq30=res[1],prec=res[2],inv=res[3],fotos=res[4];
    const mPrec={};
    prec.rows.forEach(r=>{ const c=codigo(prec.code?r[prec.code]:Object.values(r)[0]); if(!c) return;
      mPrec[c]={lista:num(campo(r,COL_LISTA,'Lista Costa 1','Lista')),precio:num(campo(r,COL_PRECIO,'Oferta Costa 1','Precio','Oferta')),dcto:descPct(num(campo(r,COL_DESCUENTO,'Dcto Costa 1','Descuento','Dcto'))),nombre:campo(r,'Nombre Producto','Nombre del producto','Nombre')}; });
    const mFoto={};
    fotos.rows.forEach(r=>{ const c=codigo(fotos.code?r[fotos.code]:Object.values(r)[0]); if(!c) return;
      mFoto[c]={nombre:campo(r,COL_NOMBRE,'Nombre'),sublinea:campo(r,COL_SUBLINEA,'Sublinea','Sublínea','Sub linea'),foto:campo(r,COL_FOTO,'Foto','Imagen','Image')}; });
    const mInv={}; const setAlm=new Set();
    inv.rows.forEach(r=>{ const c=codigo(inv.code?r[inv.code]:Object.values(r)[0]); if(!c) return;
      const q=num(campo(r,COL_CANTIDAD,'Libre utilización','Libre utilizacion','Cantidad','Stock','Existencias'));
      const t=campo(r,COL_TIENDA,'Nombre 1','Tienda','Centro','Almacén','Almacen');
      if(!mInv[c]) mInv[c]={total:0,tiendas:{}};
      mInv[c].total+=q; if(t){ mInv[c].tiendas[t]=(mInv[c].tiendas[t]||0)+q; setAlm.add(t); } });
    ALMACENES=[...setAlm].sort();
    const setSub=new Set();
    function construir(tab,origen){ return tab.rows.map(r=>{ const c=codigo(tab.code?r[tab.code]:Object.values(r)[0]); if(!c) return null;
      const pr=mPrec[c]||{},fo=mFoto[c]||{},iv=mInv[c]||{total:0,tiendas:{}};
      const nombre=fo.nombre||pr.nombre||campo(r,'NOMBRE DEL PRODUCTO','Nombre del producto','Nombre')||c;
      const sublinea=fo.sublinea||''; if(sublinea) setSub.add(sublinea);
      const ahora=pr.precio||0,dcto=pr.dcto||0;
      const antes=(pr.lista&&pr.lista>0)?pr.lista:((ahora&&dcto>0&&dcto<100)?ahora/(1-dcto/100):0);
      return {codigo:c,nombre,sublinea,foto:urlFoto(fo.foto),ahora,antes,desc:dcto,inv:iv.total,tiendas:iv.tiendas,origen}; }).filter(Boolean); }
    TODOS=construir(liq60,'alto').concat(construir(liq30,'bajo'));
    SUBLINEAS=[...setSub].sort();
    if(TODOS.length===0){ document.getElementById('estado').innerHTML='No se pudieron leer los productos. Verifica que la hoja esté compartida como "Cualquiera con el enlace → Lector".'; return; }
    llenarTiendas(); llenarSublineas(); pintar();
  });
}

document.getElementById('buscar').addEventListener('input',function(){ pagina=1; pintar(); });
cargar();
</script>
</body>
